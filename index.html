<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>GENTLE STUDIO | 크리에이터 지원하기</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lemondetox.github.io/landing/">
    <meta property="og:title" content="GENTLE STUDIO | 크리에이터 지원폼">
    <meta property="og:description" content="이미지 구독 플랫폼 수익화부터 고품격 1:1 맞춤 촬영까지, 젠틀스튜디오와 함께하세요.">
    <meta property="og:image" content="https://rawcdn.githack.com/ADplanters/GENTLESTUDIO/b7d01ea2c8c69a86dd1e1211c862724e2b602a88/%EC%A0%A0%ED%8B%80%EC%8A%A4%ED%8A%9C%EB%94%94%EC%98%A4.png?raw=true">
    
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #faf9f7; 
            --bg-alt: #f1eee9;   
            --text-dark: #111111;
            --text-light: #555555;
            --font-aggro: 'Black Han Sans', sans-serif;
            --font-sans: 'Noto Sans KR', sans-serif;
            --required-color: #ff0000;
            --primary-gold: #fff176; /* 하이라이트 색상 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-sans);
            color: var(--text-dark);
            background-color: var(--bg-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        @media (min-width: 768px) { .container { padding: 0 40px; } }

        .section-padding { padding: 80px 0; }
        @media (min-width: 768px) { .section-padding { padding: 120px 0; } }

        .aggro-text { font-family: var(--font-aggro); text-transform: uppercase; word-break: keep-all; }

        /* --- 애니메이션 기반 설정 --- */
        .reveal {
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Hero Section --- */
        .hero {
            min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            position: relative; z-index: 0;
            background: linear-gradient(rgba(250,249,247,0.75), rgba(250,249,247,0.85));
        }
        .hero::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://rawcdn.githack.com/ADplanters/foseld/3e00a2d1b90008d73d8e0cf784ed2a05211b338e/%ED%81%AC%EB%A6%AC%EC%97%90%EC%9D%B4%ED%84%B0.png?raw=true');
            background-size: cover; background-position: center;
            filter: blur(7px); opacity: 0.6; z-index: -1;
        }

        .main-logo { width: 85%; max-width: 500px; margin-bottom: 30px; }
        .hero-sub-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 15px; color: #000; }
        
        /* 형광펜 효과 */
        .highlight {
            background: linear-gradient(180deg, transparent 60%, var(--primary-gold) 60%);
            padding: 0 4px;
            display: inline;
        }
        
        .hero-desc { 
            font-size: 0.95rem; 
            color: var(--text-light); 
            margin-bottom: 35px; 
            max-width: 600px; 
            word-break: keep-all;
            padding: 0 10px;
        }

        /* 버튼 & 삼각형 화살표 */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 12px;
            padding: 18px 45px; background: #000; color: #fff; text-decoration: none;
            font-family: var(--font-aggro); font-size: 1.1rem; border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }
        .btn:hover { transform: translateY(-3px); background: #222; }
        .btn svg { width: 12px; height: 12px; fill: currentColor; }

        /* --- Support System Section --- */
        .specialties-bg { background: #000; color: #fff; }
        .spec-card { 
            background: #1a1a1a; 
            padding: 40px 30px; 
            border-left: 1px solid #333; 
            border-bottom: 4px solid #fff;
            transition: background 0.3s ease;
        }
        .spec-card:hover { background: #222; }
        .spec-card h3 { font-size: 1.5rem; margin-bottom: 15px; letter-spacing: 1px; }
        .spec-card p { color: #aaa; font-size: 0.9rem; }

        /* --- Application Form Section --- */
        .apply-section { background-color: var(--bg-alt); }
        .contact-form { 
            background: #fff; 
            padding: 40px 30px; 
            border-radius: 12px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.06); 
            max-width: 800px;
            margin: 0 auto;
        }
        
        .form-group { margin-bottom: 25px; display: flex; flex-direction: column; }
        .form-group label { font-weight: 700; margin-bottom: 10px; font-size: 0.9rem; color: #111; }
        .form-group label span { color: var(--required-color); margin-left: 2px; }

        .form-group input, .form-group textarea {
            padding: 18px; border: 1px solid #eee; border-radius: 8px; font-size: 16px; 
            font-family: var(--font-sans); background: #f9f9f9; transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: #000; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .btn-submit {
            width: 100%; padding: 22px; background: #000; color: #fff;
            font-family: var(--font-aggro); font-size: 1.4rem; border: none; cursor: pointer; border-radius: 8px;
            transition: all 0.3s ease;
        }
        .btn-submit:hover { background: #333; letter-spacing: 5px; }

        /* --- Footer --- */
        .site-footer {
            background: #000; color: #fff; padding: 60px 0 40px; font-size: 0.75rem; line-height: 1.8;
        }
        .footer-grid {
            display: grid; grid-template-columns: 1fr; gap: 30px; text-align: center;
        }
        @media (min-width: 768px) {
            .footer-grid { grid-template-columns: repeat(3, 1fr); text-align: left; }
        }
        .footer-item h4 {
            font-family: var(--font-aggro); font-size: 0.9rem; margin-bottom: 12px; color: #fff; letter-spacing: 1px;
        }
        .footer-item p { color: #999; word-break: keep-all; }
        .copyright {
            margin-top: 50px; padding-top: 20px; border-top: 1px solid #222; text-align: center; color: #555; letter-spacing: 2px;
        }
    </style>
</head>
